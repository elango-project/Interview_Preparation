<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TrustRealEstate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="overlay"></div>

<div class="app">

    <header class="header">
        <h1>TrustRealEstate</h1>
        <p>Smart property analysis with real financial insights</p>
    </header>

    <!-- INPUT PANEL -->
    <section class="panel">
        <h2>Your Financial Profile</h2>

        <div class="grid">
            <input id="income" type="number" placeholder="Monthly Income">
            <input id="savings" type="number" placeholder="Savings">
            <input id="downPayment" type="number" placeholder="Down Payment % (0.2)">
            <input id="interestRate" type="number" placeholder="Interest Rate (0.065)">
        </div>

        <div class="slider-box">
            <label>Risk Tolerance</label>
            <input id="risk" type="range" min="0" max="1" step="0.1">
        </div>

        <button onclick="analyze()">Analyze Properties</button>
    </section>

    <!-- RESULTS -->
    <section id="results" class="results"></section>

</div>

<script src="script.js"></script>
</body>
</html>
